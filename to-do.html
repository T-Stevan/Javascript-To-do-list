<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>To Do List</title>
</head>
<body class="font-[Poppins] bg-blue-50 flex justify-center items-center">
    <!-- Main Container -->
    <div class="w-full bg-white min-h-screen max-w-full m-10 p-5 rounded-lg">
        <!--Top section -->
        <div class="border-b border-b-gray-200 mb-5 p-4">
            <div class="flex gap-2 justify-center items-center">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#1e90ff" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-check-icon lucide-circle-check"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                </button>
                <h1 class="font-bold text-4xl ">
                    My To Do List
                </h1>
            </div>
            
            <p class="text-center font-medium text-gray-500">
                Stay organized, get things done.
            </p>
        </div>
    
        <!-- Adds new task to list -->
        <div class="flex justify-evenly gap-3 w-full">
            <label for="task"></label>
            <input class="border border-b-2 border-gray-200 p-1 w-full rounded-lg"
            type="text" name="task" id="task" placeholder="What needs to be done?">
            <button class="bg-[#1e90ff] p-2 rounded-lg w-40 text-white">
                + Add task
            </button>
        </div>

        <!-- List completion status icons-->
         <div class="flex justify-start items-center gap-5 text-white">
            <div class="flex justify-center items-center gap-2 border p-2 px-4 my-4 rounded-2xl bg-[#1e90ff] w-fit">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list-icon lucide-list"><path d="M3 5h.01"/><path d="M3 12h.01"/><path d="M3 19h.01"/><path d="M8 5h13"/><path d="M8 12h13"/><path d="M8 19h13"/></svg>
                </button>
                <p>All</p>
            </div>
            <div class="flex justify-center items-center gap-2 border p-2 px-4 rounded-2xl bg-[#1e90ff] w-fit">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clipboard-clock-icon lucide-clipboard-clock"><path d="M16 14v2.2l1.6 1"/><path d="M16 4h2a2 2 0 0 1 2 2v.832"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h2"/><circle cx="16" cy="16" r="6"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
                </button>
                <p>Pending</p>
            </div>
            <div class="flex justify-center items-center gap-2 border p-2 px-4 rounded-2xl bg-[#1e90ff] w-fit">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-check2-icon lucide-calendar-check-2"><path d="M8 2v4"/><path d="M16 2v4"/><path d="M21 14V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8"/><path d="M3 10h18"/><path d="m16 20 2 2 4-4"/></svg>
                </button>
                <p>Completed</p>
            </div>
        </div>

        <!-- Tasks to be completed -->
        <div class="flex justify-between items-center py-2 px-3 bg-gray-100 border border-b-2 border-gray-200 p-1 w-full rounded-lg">
            <div>
                <input type="checkbox" id="task1" class="rounded-full">
                <label for="task1">Finish Google Course</label>
            </div>
            <div class="flex gap-6">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="darkgrey" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil-icon lucide-pencil"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                </button>
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-icon lucide-trash"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                        <path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex justify-start mt-2">
            <button class="grow gap-2 p-2 px-4 rounded-2xl text-white bg-[#f24343] w-fit">
                Clear list
            </button>
        </div>
    </div>
    

</body>
</html>
